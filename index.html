<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema V2 - Planta Frutas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24 font-sans antialiased">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700 sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-base font-black tracking-wider text-slate-200 uppercase">Control V2</h1>
            <p id="global-status" class="text-[10px] text-amber-400 font-medium italic">Sincronizando con la nube...</p>
        </div>
        <button id="admin-toggle-btn" onclick="promptAdmin()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-xl font-bold border border-slate-600 transition">
            🔑 Gerente
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">

        <section id="view-home" class="app-view space-y-4 text-center py-6">
            <h2 class="text-2xl font-black text-indigo-400 mb-6">Seleccione su Área</h2>
            <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto">
                <button onclick="switchView('frutas')" class="bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl flex items-center justify-between shadow-xl">
                    <span class="text-3xl">🍓</span>
                    <div class="text-left"><span class="block font-black text-lg">Área de Frutas</span></div>
                    <span class="text-slate-500 font-bold">➔</span>
                </button>
                <button onclick="switchView('empaque')" class="bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl flex items-center justify-between shadow-xl">
                    <span class="text-3xl">📦</span>
                    <div class="text-left"><span class="block font-black text-lg">Área de Empaque</span></div>
                    <span class="text-slate-500 font-bold">➔</span>
                </button>
                <button onclick="switchView('historial')" class="bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl flex items-center justify-between shadow-xl">
                    <span class="text-3xl">📋</span>
                    <div class="text-left"><span class="block font-black text-lg">Trazabilidad</span></div>
                    <span class="text-slate-500 font-bold">➔</span>
                </button>
            </div>
        </section>

        <section id="view-frutas" class="app-view hidden space-y-4">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl space-y-4">
                <button onclick="switchView('home')" class="text-[10px] text-slate-400 font-bold mb-2 flex items-center gap-1 hover:underline">⬅ Volver</button>
                <h2 class="text-lg font-extrabold text-indigo-400 flex items-center gap-2">🍓 Área de Frutas</h2>
                
                <div class="bg-slate-900/60 p-2 rounded-xl flex gap-2 text-xs">
                    <button id="mode-new-btn" onclick="setFrutasMode(false)" class="flex-1 py-2 rounded-lg font-bold bg-indigo-600 text-white">🆕 Iniciar Nuevo</button>
                    <button id="mode-resume-btn" onclick="setFrutasMode(true)" class="flex-1 py-2 rounded-lg font-bold bg-slate-700 text-slate-300">🔄 Retomar Lote</button>
                </div>

                <div id="f-step-1" class="space-y-3">
                    <div id="f-container-retomar" class="hidden">
                        <label class="block text-xs font-bold uppercase text-amber-400 mb-1">Seleccionar Pedido Parcial:</label>
                        <select id="f-pedido-parcial-select" onchange="autoFillRetomado()" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm outline-none text-amber-200"></select>
                    </div>

                    <div id="f-grupo-manual-inputs" class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cliente / Nombre del Pedido:</label>
                            <input type="text" id="f-nombre" placeholder="Ej: Walmart - Pedido 1" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Tipo de fruto:</label>
                            <select id="f-fruta" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm outline-none"></select>
                        </div>
                    </div>

                    <div>
                        <label id="f-label-peso-in" class="block text-xs font-bold uppercase text-slate-400 mb-1">Peso Entrada (Lbs):</label>
                        <input type="number" id="f-peso-in" placeholder="0.00" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm outline-none">
                    </div>
                    
                    <div class="pt-4 text-center">
                        <span id="chrono-display" class="text-5xl font-mono font-black text-slate-500 block mb-4">00:00:00</span>
                        <button id="btn-start" onclick="startTimer()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl text-xs uppercase">Iniciar Proceso</button>
                        <button id="btn-stop" onclick="stopTimer()" class="w-full bg-rose-600 text-white font-black py-4 rounded-xl text-xs uppercase hidden">Detener Cronómetro</button>
                    </div>
                </div>

                <div id="f-step-2" class="hidden mt-6 border-t border-slate-700 pt-5 space-y-4">
                    <select id="f-estado-cierre" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm font-bold">
                        <option value="Proceso Completo">Pedido Terminado Completo</option>
                        <option value="Proceso Parcial">Pedido Terminado Parcialmente</option>
                    </select>
                    <input type="number" id="f-peso-dinamico-input" placeholder="Libras procesadas hoy" class="w-full px-4 py-3 bg-slate-900 border border-emerald-600 rounded-xl text-sm outline-none">
                    <button onclick="saveLoteFrutas()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl text-sm uppercase">Guardar Registro</button>
                </div>
            </div>
            
            <div id="g-box-catalogo" class="hidden bg-slate-800 p-5 rounded-2xl border border-amber-500/30 space-y-3">
                <h3 class="text-xs font-black text-amber-400 uppercase">⚙️ Catálogo (Gerente)</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-fruta-input" class="flex-1 px-3 py-2 bg-slate-900 border border-slate-600 rounded-xl text-xs">
                    <button onclick="addFrutaCatalog()" class="bg-amber-500 text-slate-900 font-bold px-4 rounded-xl text-xs">Añadir</button>
                </div>
                <ul id="catalog-list" class="space-y-1 text-xs"></ul>
            </div>
        </section>

        <section id="view-empaque" class="app-view hidden space-y-4">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl space-y-4">
                <button onclick="switchView('home')" class="text-[10px] text-slate-400 font-bold flex items-center gap-1 hover:underline">⬅ Volver</button>
                <h2 class="text-lg font-extrabold text-amber-400">📦 Área de Empaque</h2>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Seleccionar Lote a Empacar:</label>
                    <select id="e-pedido-select" onchange="actualizarInfoEmpaque()" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm text-amber-200 font-medium"></select>
                </div>

                <div id="e-info-box" class="hidden bg-slate-900/80 p-3 rounded-xl border border-slate-700 text-xs">
                    <span class="block text-slate-400 mb-1">Estado de la Fruta en Producción:</span>
                    <span id="e-info-status" class="font-black px-2 py-1 rounded bg-indigo-900/50 text-indigo-300 border border-indigo-700/50"></span>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Estado de este Empaque:</label>
                    <select id="e-estado-cierre" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm">
                        <option value="Empacado Total">Empacado Completamente (Finalizado)</option>
                        <option value="Empacado Parcial">Empacado Parcialmente (Dejar Abierto)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cajas empacadas en esta sesión:</label>
                    <input type="number" id="e-cajas" placeholder="0" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-sm">
                </div>
                
                <button onclick="submitEmpaque()" class="w-full bg-amber-500 text-slate-900 font-black py-4 rounded-xl text-sm uppercase">Guardar Empaque</button>
            </div>
        </section>

        <section id="view-historial" class="app-view hidden space-y-4">
            <div class="flex justify-between items-center">
                <button onclick="switchView('home')" class="text-[10px] text-slate-400 font-bold flex items-center gap-1 hover:underline">⬅ Volver</button>
                <button id="btn-export" onclick="exportExcel()" class="hidden bg-slate-800 border border-slate-700 hover:bg-slate-700 text-xs px-3 py-1 rounded-lg font-bold">📊 Excel</button>
            </div>
            
            <div id="cards-container" class="space-y-3"></div>

            <div id="g-box-gestion-ordenes" class="hidden bg-slate-800 p-5 rounded-2xl border border-rose-500/30 space-y-3 mt-6">
                <h3 class="text-sm font-black text-rose-400 uppercase">🗑️ Gestión de Órdenes</h3>
                <select id="g-lote-select" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-xl text-xs"></select>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="gerenteOcultarLoteApp()" class="bg-slate-700 text-white text-[11px] font-bold py-2 rounded-xl">Ocultar de App</button>
                    <button onclick="gerenteBorrarLoteTotal()" class="bg-rose-600 text-white text-[11px] font-black py-2 rounded-xl uppercase">Borrar Total ✕</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-850 border-t border-slate-700 p-2 grid grid-cols-3 gap-1 z-50 shadow-2xl backdrop-blur-lg">
        <button onclick="switchView('frutas')" class="flex flex-col items-center py-2 text-slate-400 font-bold"><span class="text-base">🍓</span><span class="text-[9px]">Frutas</span></button>
        <button onclick="switchView('empaque')" class="flex flex-col items-center py-2 text-slate-400 font-bold"><span class="text-base">📦</span><span class="text-[9px]">Empaque</span></button>
        <button onclick="switchView('historial')" class="flex flex-col items-center py-2 text-slate-400 font-bold"><span class="text-base">📋</span><span class="text-[9px]">Historial</span></button>
    </nav>

    <script>
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbym7TvHZhL3GrWKmkFzvTY3hCfBxez43L0sYsk0UCI4FQlVXP-lIbJT473Fa6jy82jpFA/exec"; // <-- Pega el enlace aquí
        const GERENTE_PASSWORD = "PRODUCCION2026";

        let isAdmin = false;
        let frutasCatalog = [];
        let pedidosPendientes = [];
        let pedidosParciales = []; 
        let historialCompleto = [];
        
        let isRetomadoMode = false; 
        let timerInterval = null;
        let startTime = null;
        let elapsedTimeInSeconds = 0;

        window.addEventListener('DOMContentLoaded', () => { fetchDataFromCloud(); switchView('home'); });

        function fetchDataFromCloud() {
            document.getElementById('global-status').innerText = "⏳ Sincronizando...";
            fetch(GOOGLE_SHEETS_URL).then(res => res.json()).then(data => {
                frutasCatalog = data.frutas || [];
                pedidosPendientes = data.pedidosPendientes || [];
                pedidosParciales = data.pedidosParciales || [];
                historialCompleto = data.historial || [];
                
                renderFrutasSelect(); renderParcialesSelect(); renderEmpaqueSelect(); renderMobileHistory(); renderGerenteLoteSelect();
                document.getElementById('global-status').innerText = "✅ Sincronizado";
                document.getElementById('global-status').className = "text-[10px] text-emerald-400 font-medium italic";
            });
        }

        function switchView(viewName) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
        }

        function setFrutasMode(mode) {
            isRetomadoMode = mode;
            if(mode) {
                document.getElementById('f-grupo-manual-inputs').classList.add('hidden');
                document.getElementById('f-container-retomar').classList.remove('hidden');
                document.getElementById('f-peso-in').disabled = true;
            } else {
                document.getElementById('f-grupo-manual-inputs').classList.remove('hidden');
                document.getElementById('f-container-retomar').classList.add('hidden');
                document.getElementById('f-peso-in').disabled = false;
            }
        }

        function autoFillRetomado() {
            const val = document.getElementById('f-pedido-parcial-select').value;
            const lote = pedidosParciales.find(p => p.id === val);
            if(lote) {
                document.getElementById('f-nombre').value = lote.nombre;
                document.getElementById('f-fruta').value = lote.fruta;
                document.getElementById('f-peso-in').value = lote.pesoEntrada;
            }
        }

        function startTimer() {
            startTime = new Date();
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
            document.getElementById('chrono-display').className = "text-5xl font-mono font-black text-emerald-400 block mb-4";

            timerInterval = setInterval(() => {
                elapsedTimeInSeconds = Math.floor((new Date() - startTime) / 1000);
                const hrs = Math.floor(elapsedTimeInSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((elapsedTimeInSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (elapsedTimeInSeconds % 60).toString().padStart(2, '0');
                document.getElementById('chrono-display').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('f-step-2').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function saveLoteFrutas() {
            const payload = {
                action: "registroFrutas",
                isRetomado: isRetomadoMode,
                idPedido: document.getElementById('f-pedido-parcial-select').value,
                nombrePedido: document.getElementById('f-nombre').value,
                frutaTipo: document.getElementById('f-fruta').value,
                pesoEntrada: document.getElementById('f-peso-in').value,
                pesoSalida: document.getElementById('f-estado-cierre').value === "Proceso Completo" ? document.getElementById('f-peso-dinamico-input').value : 0,
                salidaSesionActual: document.getElementById('f-peso-dinamico-input').value,
                estadoFrutas: document.getElementById('f-estado-cierre').value,
                pesoParcial: document.getElementById('f-peso-dinamico-input').value,
                fecha: new Date().toLocaleDateString('es-ES'),
                start: startTime.toLocaleTimeString('es-ES'),
                end: new Date().toLocaleTimeString('es-ES'),
                durationSecs: elapsedTimeInSeconds
            };
            fetch(GOOGLE_SHEETS_URL, { method: "POST", body: JSON.stringify(payload) }).then(() => location.reload());
        }

        function renderEmpaqueSelect() {
            const select = document.getElementById('e-pedido-select');
            select.innerHTML = '<option value="">-- Seleccionar Lote --</option>';
            // Filtro exclusivo de Empaque: Oculta los que ya están "Empacado Total"
            pedidosPendientes.filter(p => p.visibleApp === "SI" && p.estadoEmpaqueGlobal !== "Empacado Total").forEach(p => { 
                select.innerHTML += `<option value="${p.id}">${p.nombre} (${p.fruta})</option>`; 
            });
        }

        function actualizarInfoEmpaque() {
            const idPed = document.getElementById('e-pedido-select').value;
            const box = document.getElementById('e-info-box');
            if(!idPed) { box.classList.add('hidden'); return; }
            
            const lote = pedidosPendientes.find(p => p.id === idPed);
            if(lote) {
                document.getElementById('e-info-status').innerText = lote.estadoFrutas;
                box.classList.remove('hidden');
            }
        }

        function submitEmpaque() {
            const idPed = document.getElementById('e-pedido-select').value;
            const lote = pedidosPendientes.find(p => p.id === idPed);
            if(!lote) return;

            const payload = {
                action: "registroEmpaque",
                idPedido: idPed,
                nombrePedido: lote.nombre,
                frutaTipo: lote.fruta,
                fechaEmpaque: new Date().toLocaleDateString('es-ES'),
                cajas: document.getElementById('e-cajas').value,
                estadoEmpaque: document.getElementById('e-estado-cierre').value
            };
            fetch(GOOGLE_SHEETS_URL, { method: "POST", body: JSON.stringify(payload) }).then(() => { alert("Empaque registrado en línea."); fetchDataFromCloud(); switchView('historial'); });
        }

        function renderMobileHistory() {
            const container = document.getElementById('cards-container'); container.innerHTML = "";
            const filtrado = historialCompleto.filter(i => i.visibleApp === "SI");
            
            [...filtrado].reverse().forEach(p => {
                // Generador de colores del semáforo para el Historial
                let fColor = p.estadoFrutas === "Proceso Completo" ? "emerald" : "amber";
                let eColor = p.estadoEmpaqueGlobal === "Empacado Total" ? "emerald" : (p.estadoEmpaqueGlobal === "Empacado Parcial" ? "amber" : "slate");

                const card = document.createElement('div');
                card.className = "bg-slate-800 p-4 rounded-xl border border-slate-700/70 shadow text-xs";
                card.innerHTML = `
                    <div class="flex justify-between border-b border-slate-700 pb-2 mb-2">
                        <span class="font-mono bg-slate-900 px-1.5 py-0.5 rounded text-slate-400">${p.id}</span>
                        <span class="font-bold text-slate-300">${p.fruta}</span>
                    </div>
                    <h4 class="text-sm font-black text-slate-200">${p.nombre}</h4>
                    
                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <div class="bg-${fColor}-900/20 border border-${fColor}-700/50 p-2 rounded-lg text-center">
                            <span class="block text-[9px] uppercase tracking-wider text-${fColor}-400 mb-1">Frutas</span>
                            <span class="font-bold text-${fColor}-200">${p.estadoFrutas}</span>
                        </div>
                        <div class="bg-${eColor}-900/20 border border-${eColor}-700/50 p-2 rounded-lg text-center">
                            <span class="block text-[9px] uppercase tracking-wider text-${eColor}-400 mb-1">Empaque</span>
                            <span class="font-bold text-${eColor}-200">${p.estadoEmpaqueGlobal}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Funciones Gerencia idénticas a la v1 ---
        function promptAdmin() { /* ... igual ... */ }
        function renderFrutasSelect() { const sel = document.getElementById('f-fruta'); sel.innerHTML=''; frutasCatalog.forEach(f => sel.innerHTML+=`<option value="${f}">${f}</option>`); }
        function renderParcialesSelect() { const sel = document.getElementById('f-pedido-parcial-select'); sel.innerHTML='<option value="">- Seleccione -</option>'; pedidosParciales.filter(p=>p.visibleApp==="SI").forEach(p => sel.innerHTML+=`<option value="${p.id}">${p.nombre}</option>`); }
        function renderGerenteLoteSelect() { const sel = document.getElementById('g-lote-select'); sel.innerHTML='<option value=""></option>'; historialCompleto.forEach(p => sel.innerHTML+=`<option value="${p.id}">${p.id}</option>`); }
        function gerenteOcultarLoteApp() { fetch(GOOGLE_SHEETS_URL, {method:"POST", body:JSON.stringify({action:"ocultarLoteManual", idPedido:document.getElementById('g-lote-select').value})}).then(()=>fetchDataFromCloud()); }
        function gerenteBorrarLoteTotal() { fetch(GOOGLE_SHEETS_URL, {method:"POST", body:JSON.stringify({action:"deleteLote", idPedido:document.getElementById('g-lote-select').value})}).then(()=>fetchDataFromCloud()); }
    </script>
</body>
</html>
